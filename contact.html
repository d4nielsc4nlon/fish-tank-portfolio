<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Daniel Scanlon | Contact</title>

<style>

  *,
*::before,
*::after {
  box-sizing: border-box;
}
html, body {
  margin: 0;
  height: 100%;
  background: #061a2a;
}

body {
  color: white;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  overflow-x: hidden;
}

/* Pixel aesthetic */
.pixel {
  image-rendering: pixelated;
  -webkit-font-smoothing: none;
  letter-spacing: 1px;
}

@media (max-width: 600px) {

  .wrap {
    padding:
      calc(env(safe-area-inset-top, 0px) + 60px)
      14px
      calc(env(safe-area-inset-bottom, 0px) + 36px);
  }

  .panel {
  position: relative;
  z-index: 30;

  width: min(880px, 92vw); /* 👈 tighter + safer */
  margin: 40px auto;

  background: rgba(0,0,0,0.12);
  border: 1px solid rgba(255,255,255,0.28);
  padding: 20px;

  backdrop-filter: blur(8px);
}

  .grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr)); /* 👈 critical fix */
  gap: 14px;
}

  button {
    min-width: 100%;
  }
}

/* 🔥 TOP BAR */
.topbar {
  position: fixed;
  left: 16px;
  right: 16px;
  top: calc(env(safe-area-inset-top, 0px) + 14px);
  display: flex;
  justify-content: space-between;
  z-index: 50;
}

.back {
  text-decoration: none;
  color: white;
  opacity: 0.85;
}
.back:hover { opacity: 1; }

/* 🔥 WRAP — FIXED ABOVE CANVAS */
.wrap {
  position: fixed;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: flex-start; /* 👈 prevents vertical clipping */

  overflow-y: auto;

  padding:
    calc(env(safe-area-inset-top, 0px) + 70px)
    20px
    calc(env(safe-area-inset-bottom, 0px) + 40px);

  z-index: 25;
}

/* 🔥 PANEL */
.panel {
  position: relative;
  z-index: 30;

  width: min(920px, 100%);
  margin: 40px 0; /* 👈 ensures breathing room */

  background: rgba(0,0,0,0.22);
  border: 1px solid rgba(255,255,255,0.28);
  padding: 22px;

  backdrop-filter: blur(8px);
}

/* TEXT */
h1 {
  margin: 0 0 10px;
  font-size: 18px;
}

.sub {
  font-size: 13px;
  opacity: 0.9;
  line-height: 1.5;
  margin-bottom: 18px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* CONTACT ROW */
.contactRow {
  display: flex;
  gap: 12px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.05);
}

.icon {
  width: 32px;
  height: 32px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255,255,255,0.3);
}

.label {
  font-size: 11px;
  opacity: 0.7;
}

.value {
  font-size: 14px;
}

/* LINKS */
a {
  color: white;
  text-decoration: none;
  border-bottom: 1px dotted rgba(255,255,255,0.4);
}

/* FORM */
form {
  display: grid;
  gap: 12px;
  margin-top: 22px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.15);
}

.field {
  display: grid;
  gap: 6px;
}

input, textarea {
  width: 100%;
  max-width: 100%; /* 👈 prevents overflow */

  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.2);
  color: white;

  padding: 12px;
  font-size: 14px;
  font-family: inherit;

  display: block;
}

textarea {
  min-height: 140px;
  resize: vertical;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

button {
  flex: 1 1 0; /* 👈 equal width buttons */
  min-width: 0;

  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.08);
  color: white;

  padding: 12px;
  font-family: inherit;
  letter-spacing: 1px;

  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.15);
}

/* 🔥 MOBILE FIXES */
@media (max-width: 600px) {

  .wrap {
    padding:
      calc(env(safe-area-inset-top, 0px) + 60px)
      14px
      calc(env(safe-area-inset-bottom, 0px) + 28px);
  }

  .panel {
    width: 94vw;
    padding: 18px;
  }

  .grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  h1 { font-size: 16px; }

  .sub { font-size: 12px; }

  .value { font-size: 13px; }
}
</style>
</head>

<body>

<!-- UI -->
<div class="topbar pixel">
  <a class="back" href="/">← BACK TO TANK</a>
  <div style="opacity:.8;">CONTACT</div>
</div>

<div class="wrap">
  <div class="panel pixel">

    <h1>Contact</h1>
    <p class="sub">
      I'm open for commissions! Reach out with your favorite ideas.
    </p>

    <div class="grid">
      <div class="contactRow">
        <div class="icon">☎</div>
        <div>
          <div class="label">PHONE</div>
          <div class="value">
            <a href="tel:+12674536540">267-453-6540</a>
          </div>
        </div>
      </div>

      <div class="contactRow">
        <div class="icon">✉</div>
        <div>
          <div class="label">EMAIL</div>
          <div class="value">
            <a href="mailto:danielmaxscanlon@gmail.com">
              danielmaxscanlon@gmail.com
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="contactRow" style="margin-top:14px;">
      <div class="icon">▦</div>
      <div>
        <div class="label">SEND A MESSAGE</div>
        <div style="font-size:12px; opacity:0.8;">
          This form opens your email client with everything pre-filled.
        </div>
      </div>
    </div>

    <form id="contactForm">

      <div class="grid">
        <div class="field">
          <label>NAME</label>
          <input id="name" type="text" placeholder="Your name" required>
        </div>

        <div class="field">
          <label>YOUR EMAIL</label>
          <input id="from" type="email" placeholder="name@email.com" required>
        </div>
      </div>

      <div class="field">
        <label>SUBJECT</label>
        <input id="subject" type="text" placeholder="What’s this about?" required>
      </div>

      <div class="field">
        <label>MESSAGE</label>
        <textarea id="message" placeholder="Write your message…" required></textarea>
      </div>

      <div class="actions">
        <button type="submit">OPEN EMAIL CLIENT</button>
        <button type="button" id="copyBtn">COPY MESSAGE</button>
        <button type="reset">CLEAR</button>
      </div>
    </form>
  </div>
</div>

<!-- Three.js background -->
<script type="module" src="/src/contact.js"></script>

<script>
(function () {
  const to = 'danielmaxscanlon@gmail.com';
  const form = document.getElementById('contactForm');
  const copyBtn = document.getElementById('copyBtn');

  const nameInput = document.getElementById('name');
  const fromInput = document.getElementById('from');
  const subjectInput = document.getElementById('subject');
  const messageInput = document.getElementById('message');

  function buildMailto() {
    return `mailto:${to}?subject=${encodeURIComponent(subjectInput.value)}&body=${encodeURIComponent(
      messageInput.value + "\\n\\n—\\nFrom: " + nameInput.value + "\\nEmail: " + fromInput.value
    )}`;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    window.location.href = buildMailto();
  });

  copyBtn.addEventListener('click', async () => {
    await navigator.clipboard.writeText(messageInput.value);
  });
})();
</script>

</body>
</html>
