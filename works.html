




<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Selected Works</title>



<style>
  
body {
  margin: 0;
  background: #000; /* fallback */
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;

  background-image: radial-gradient(rgba(255,255,255,0.15) 3px, transparent 3px);
  background-size: 16px 16px;

  opacity: 1; /* 🔥 VERY subtle */
  mix-blend-mode: overlay;
  mask-image: linear-gradient(
  to bottom,
  rgba(0,0,0,0.8),
  rgba(0,0,0,0.3) 80%,
  rgba(0,0,0,0)
);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;

  background: linear-gradient(
    to top,
    rgba(47,123,181,0.4) 0%,
    rgba(47,123,181,0.2) 20%,
    rgba(0,0,0,0) 40%
  );
}


/* VIEWPORT GRADIENT (locked) */
.bg-gradient {
  position: fixed;
  inset: 0;
  z-index: -2;

  background: linear-gradient(
    to bottom,
    #ffffff 0%,
    #7fb6db 40%,
    #2f7bb5 100%
  );
}

#bg3d {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 24px;
  left: 28px;
  z-index: 1000;
}

.back {
  text-decoration: none;
  color: white;
  padding: 8px 0;
  font-size: 14px;
  letter-spacing: 0.08em;
  transition: color 0.2s ease, text-shadow 0.2s ease;
  font-weight:500;
}

.back:hover {
  color: #7cff00;
  text-shadow: 0 0 6px #7cff00;
}

/* FILTERS */
.filters {
  text-align: center;
  margin-top: 78px;
  margin-bottom: 80px;
}

.filters button {
  background: none;
  border: none;
  color: white;
  margin: 0 28px;
  cursor: pointer;
  font-family: inherit;
  font-size: 18px;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.filters button:hover,
.filters button.active {
  color: #7cff00;
}

/* GALLERY */
.gallery {
  padding: 0 40px 40px;
  column-count: 3;
  column-gap: 20px;
  transition: opacity 0.25s ease;
}

.gallery.fade-out {
  opacity: 0;
}

.gallery.fade-in {
  opacity: 1;
}


.item {
  position: relative;
  overflow: hidden;
  margin-bottom: 20px;
  break-inside: avoid;
  opacity: 0;
  transform: translateY(20px);
  border: 2px solid transparent;
  transition:
    opacity 0.5s ease,
    transform 0.5s ease,
    border-color 0.2s ease;
}

.item.show {
  opacity: 1;
  transform: translateY(0);
}

.item:hover {
  border-color: lime;
}

.item img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.4s ease, filter 0.4s ease;
}

.item:hover img {
  transform: scale(1.04) translateY(-2px);
  filter: brightness(1.05);
}

/* VIEWER */
.viewer {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0, 0, 0, 0.95);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.viewer img {
  max-width: 90vw;
  max-height: 80vh;
}

.caption {
  margin-top: 12px;
  opacity: 0.7;
  color: rgba(255,255,255,0.7);
}

.nav {
  position: absolute;
  top: 50%;
  font-size: 30px;
  cursor: pointer;
  user-select: none;
  z-index: 2100;
}

.left {
  left: 30px;
   opacity: 0.7;
  color: rgba(255,255,255,0.7);
}

.right {
  right: 30px;
   opacity: 0.7;
  color: rgba(255,255,255,0.7);
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  cursor: pointer;
  font-size: 22px;
  z-index: 2100;
     opacity: 0.7;
  color: rgba(255,255,255,0.7);
}

.nav:hover,
.close:hover {
  color: #7cff00;
  text-shadow: 0 0 6px #7cff00;
}

.scroll-buffer {
  height: 100vh;

  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0%,
    rgba(47,123,181,0.2) 40%,
    rgba(47,123,181,0.4) 100%
  );

  pointer-events: none;
}

/* RESPONSIVE */
@media (max-width: 1200px) {
  .gallery {
    column-count: 2;
  }
}


@media (max-width: 700px) {
  .filters {
    margin-top: 86px;
    margin-bottom: 48px;
  }

  .filters button {
    display: inline-block;
    margin: 8px 12px;
    font-size: 14px;
  }

  .gallery {
    column-count: 1;
    padding: 0 24px 32px;
  }
}
</style>
</head>

<body>
<div class="bg-gradient"></div>
<div class="topbar">
  <a class="back" href="/">← BACK TO TANK</a>
</div>

<canvas id="bg3d"></canvas>


<div class="filters">
  <button class="active" data-filter="all">ALL</button>
  <button data-filter="architecture">ARCHITECTURE</button>
  <button data-filter="graphics">GRAPHICS</button>
  <button data-filter="animation">ANIMATION</button>
</div>

<div class="gallery"></div>
<div class="scroll-buffer"></div> 

<div class="viewer" id="viewer">
  <div class="close">✕</div>
  <div class="nav left">←</div>
  <img id="viewerImg" />
  <div class="nav right">→</div>
  <div class="caption" id="caption"></div>
</div>

<script type="module">

import * as THREE from "three";
import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";
import { EffectComposer } from "three/examples/jsm/postprocessing/EffectComposer.js";
import { RenderPass } from "three/examples/jsm/postprocessing/RenderPass.js";
import { ShaderPass } from "three/examples/jsm/postprocessing/ShaderPass.js";

const canvas = document.getElementById("bg3d");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  15,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0, -1.8, 35);

const renderer = new THREE.WebGLRenderer({
  canvas,
  alpha: true,
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

/// ✅ FIXED POSTPROCESSING

const composer = new EffectComposer(renderer);

// 🔥 RENDER FIRST
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

// PIXEL PASS
const pixelShader = {
  uniforms: {
    tDiffuse: { value: null },
    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    pixelSize: { value: 2 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 resolution;
    uniform float pixelSize;
    varying vec2 vUv;

    void main() {
      vec2 dxy = pixelSize / resolution;
      vec2 coord = dxy * floor(vUv / dxy);
      gl_FragColor = texture2D(tDiffuse, coord);
    }
  `
};

const pixelPass = new ShaderPass(pixelShader);
composer.addPass(pixelPass);

// BLUR PASS
const blurShader = {
  uniforms: {
    tDiffuse: { value: null },
    strength: { value: 0.00075 }
  },
  vertexShader: pixelShader.vertexShader,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float strength;
    varying vec2 vUv;

    void main() {
      vec4 sum = vec4(0.0);

      sum += texture2D(tDiffuse, vUv + vec2(-strength, -strength));
      sum += texture2D(tDiffuse, vUv + vec2( strength, -strength));
      sum += texture2D(tDiffuse, vUv + vec2(-strength,  strength));
      sum += texture2D(tDiffuse, vUv + vec2( strength,  strength));

      gl_FragColor = sum * 0.25;
    }
  `
};

const blurPass = new ShaderPass(blurShader);
composer.addPass(blurPass);

// update sizes
composer.setSize(window.innerWidth, window.innerHeight);
pixelPass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));

// MODEL
const loader = new GLTFLoader();

loader.load("/models/city_use.glb", (gltf) => {
  const city = gltf.scene;

  city.scale.set(2.5, 2.5, 2.5);
  city.position.set(0, -5, 0);

  city.traverse((child) => {
    if (child.isMesh) {
      child.material = new THREE.MeshBasicMaterial({
        color: 0x2f7bb5,
        transparent: true,
        opacity: 0.9
      });
    }
  });

  scene.add(city);
});

scene.fog = new THREE.Fog(0xcfe6f5, 15, 40);

function animate() {
  requestAnimationFrame(animate);

  camera.position.x = Math.sin(Date.now() * 0.0001) * 0.5;

  composer.render(); // 🔥 now shaders actually apply
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);

  pixelPass.uniforms.resolution.value.set(
    window.innerWidth,
    window.innerHeight
  );
});









document.addEventListener("DOMContentLoaded", () => {
  const modules = import.meta.glob(
    "./src/assets/selected_works/**/*.{png,jpg,jpeg,webp,gif,pdf}",
    { eager: true, import: "default" }
  );

  const images = Object.entries(modules).map(([path, url]) => {
    const match = path.match(/selected_works\/([^/]+)/);

    return {
      url,
      path,
      category: match ? match[1].toLowerCase() : "unknown"
    };
  });

  const gallery = document.querySelector(".gallery");
  const viewer = document.getElementById("viewer");
  const viewerImg = document.getElementById("viewerImg");
  const caption = document.getElementById("caption");
  const filterButtons = document.querySelectorAll(".filters button");

  let currentIndex = 0;
  let filtered = shuffle(images);

  function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
  }

  function cleanName(path) {
    let file = path.split("/").pop();

    try {
      file = decodeURIComponent(file);
    } catch {}

    return file
      .replace(/\.[^/.]+$/, "")
      .replace(/[-_]/g, " ");
  }

  function preloadImages(data) {
    data.forEach(item => {
      const img = new Image();
      img.src = item.url;
    });
  }

  function buildGallery(data) {
    gallery.classList.add("fade-out");

    setTimeout(() => {
      gallery.innerHTML = "";

      data.forEach((item, index) => {
        const tile = document.createElement("div");
        tile.className = "item";

        const image = document.createElement("img");
        image.src = item.url;
        image.alt = cleanName(item.path);

        tile.appendChild(image);

        tile.addEventListener("click", () => {
          currentIndex = index;
          openViewer();
        });

        gallery.appendChild(tile);

        setTimeout(() => {
          tile.classList.add("show");
        }, index * 40);
      });

      gallery.classList.remove("fade-out");
      gallery.classList.add("fade-in");
    }, 200);
  }

  function openViewer() {
    if (!filtered.length) return;
    viewer.style.display = "flex";
    updateViewer();
  }

  function updateViewer() {
    const item = filtered[currentIndex];
    viewerImg.src = item.url;
    viewerImg.alt = cleanName(item.path);
    caption.textContent = cleanName(item.path);
  }

  function closeViewer() {
    viewer.style.display = "none";
  }

  function showPrevious() {
    currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
    updateViewer();
  }

  function showNext() {
    currentIndex = (currentIndex + 1) % filtered.length;
    updateViewer();
  }

  document.querySelector(".left").addEventListener("click", showPrevious);
  document.querySelector(".right").addEventListener("click", showNext);
  document.querySelector(".close").addEventListener("click", closeViewer);

  window.addEventListener("keydown", event => {
    if (viewer.style.display !== "flex") return;

    if (event.key === "Escape") closeViewer();
    if (event.key === "ArrowRight") showNext();
    if (event.key === "ArrowLeft") showPrevious();
  });

  filterButtons.forEach(button => {
    button.addEventListener("click", () => {
      const filter = button.dataset.filter.toLowerCase();

      filterButtons.forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");

      filtered = filter === "all"
        ? shuffle(images)
        : images.filter(item => item.category === filter);

      currentIndex = 0;
      preloadImages(filtered);
      buildGallery(filtered);
    });
  });

  preloadImages(filtered);
  buildGallery(filtered);
});
</script>

</body>
</html>
